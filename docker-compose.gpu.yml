services:
  dvf-qa:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    image: dvf-qa:gpu
    platform: linux/amd64
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./data:/data:ro
      - ./outputs:/outputs
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    command:
      - --help
